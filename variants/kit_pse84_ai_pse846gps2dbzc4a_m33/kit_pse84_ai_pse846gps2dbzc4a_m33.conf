# Kconfig overlay for KIT-PSE84-AI (PSoC Edge E84, CM33 secure)
#
# NOTE: The board defconfig already provides:
#   CONFIG_GPIO=y
#   CONFIG_SERIAL=y
#   CONFIG_UART_CONSOLE=y
#   CONFIG_FPU=y
#   CONFIG_ARM_TRUSTZONE_M=y
#   CONFIG_TRUSTED_EXECUTION_SECURE=y
#   CONFIG_CORTEX_M_SYSTICK=y

# --- Stack / heap sizing for Arduino + LLEXT runtime ---
# CM33 SRAM (m33s_data) is only 132 KB — keep sizes minimal
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_HEAP_MEM_POOL_SIZE=16384
CONFIG_LLEXT_HEAP_SIZE=16
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=1024

# --- XIP flash: read sketch directly from memory, no RAM copy needed ---
CONFIG_LLEXT_STORAGE_WRITABLE=n

# --- Peripheral drivers ---
CONFIG_I2C=y
CONFIG_SPI=y

# --- Override board defconfig for Arduino LLEXT loader ---
# Board defconfig enables MPU + HW_STACK_PROTECTION which the loader doesn't need
# and ASSERT which adds code size
CONFIG_ARM_MPU=n
CONFIG_HW_STACK_PROTECTION=n

# Interrupt configuration: ensure dynamic IRQ management is enabled so the
# exported symbol `arch_irq_disconnect_dynamic` is available for the loader.
CONFIG_DYNAMIC_INTERRUPTS=y

# --- Flash driver ---
# The PSE84 QSPI controller DTS entry uses "infineon,qspi-flash-mtb-hal" which has no
# Zephyr binding, so the flash driver never compiles.  Explicitly disabling CONFIG_FLASH
# prevents the Zephyr build from trying to compile/link flash symbols, and stops
# llext_exports.c from exporting non-existent flash API symbols that would cause
# sketch link failures at upload time.
# Without this, loader/main.c would call flash_area_open/flash_area_read which do not
# exist — the loader function must guard those calls with #if defined(CONFIG_FLASH_MAP).
CONFIG_FLASH=n
CONFIG_FLASH_MAP=n

# --- Build output ---
# CONFIG_BUILD_OUTPUT_BIN=n  # removed: conflicts with Zephyr default; use HEX instead
